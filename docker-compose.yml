services:
  backend:
    build: .
    env_file:
      - .env
    extra_hosts:
      - "host.docker.internal:host-gateway"
    volumes:
      - ./certs:/certs:ro
    environment:
      API_URL: http://backend:8000/api/v1/messages
      DOWNSTREAM_API_URL: https://host.docker.internal:9000/receive
      DOWNSTREAM_CA_BUNDLE: /certs/stub.crt
    command: uvicorn app.api:app --host ${API_BIND_HOST:-0.0.0.0} --port ${API_BIND_PORT:-8000} --log-config logging_config.json
    restart: unless-stopped

  listener:
    build: .
    container_name: hl7-listener
    depends_on:
      - backend
    env_file:
      - .env
    environment:
      API_URL: http://backend:8000/api/v1/messages
    ports:
      - "2575:2575"
    command: python3 -m app.listener
    restart: unless-stopped